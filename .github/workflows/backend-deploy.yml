name: Backend Deploy

on:
  push:
    branches: [main, feat/ai-video-fulfillment]
    paths:
      - "backend/**"
      - ".github/workflows/backend-deploy.yml"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-2
  ECR_REGISTRY: 202716106225.dkr.ecr.us-east-2.amazonaws.com
  ECR_REPO: cricher-backend
  ECS_SERVICE_ARN: arn:aws:ecs:us-east-2:202716106225:service/default/cricher-backend

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::202716106225:role/gh-actions-brand-creator
          aws-region: ${{ env.AWS_REGION }}

      - uses: aws-actions/amazon-ecr-login@v2

      - name: Build + push
        run: |
          IMAGE=${ECR_REGISTRY}/${ECR_REPO}
          docker build -t $IMAGE:${GITHUB_SHA} -t $IMAGE:latest ./backend
          docker push $IMAGE:${GITHUB_SHA}
          docker push $IMAGE:latest

      - name: Update ECS Express service
        run: |
          IMAGE=${ECR_REGISTRY}/${ECR_REPO}:${GITHUB_SHA}
          PRIMARY=$(aws ecs describe-express-gateway-service \
            --service $ECS_SERVICE_ARN \
            --region $AWS_REGION \
            --query "service.activeConfigurations[0].primaryContainer" \
            --output json)
          # Swap image to new SHA-tagged build
          UPDATED=$(echo "$PRIMARY" | jq --arg img "$IMAGE" '.image = $img')
          aws ecs update-express-gateway-service \
            --service-arn $ECS_SERVICE_ARN \
            --primary-container "$UPDATED" \
            --region $AWS_REGION
          echo "ECS Express deployment triggered with image: $IMAGE"
