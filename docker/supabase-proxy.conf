# Bridge between supabase-js (which expects /storage/v1/* paths) and the
# standalone supabase/storage-api container (which serves /object/*, /bucket/*,
# etc. at the root). Strips the /storage/v1 prefix and forwards everything else
# upstream unchanged.

server {
  listen 80;
  server_name _;

  client_max_body_size 250M;
  proxy_read_timeout 120s;
  proxy_send_timeout 120s;

  # /storage/v1/<rest> -> supabase:5000/<rest>
  location /storage/v1/ {
    rewrite ^/storage/v1/(.*)$ /$1 break;
    proxy_pass http://supabase:5000;
    proxy_set_header Host $host;
    proxy_set_header Authorization $http_authorization;
  }

  # Pass-through for anything else (e.g. /status health probes).
  location / {
    proxy_pass http://supabase:5000;
    proxy_set_header Host $host;
  }
}
